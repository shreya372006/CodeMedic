<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CodeMedic{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>

{% if request.user.is_authenticated %}
<nav class="navbar">
    <div class="nav-brand">
        <i class="fa-solid fa-stethoscope"></i>
        <span>CodeMedic</span>
    </div>
    <div class="nav-links">
        <a href="{% url 'core:dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class="fa-solid fa-gauge"></i> Dashboard
        </a>
        <a href="{% url 'core:workspace' %}" class="nav-link {% if request.resolver_match.url_name == 'workspace' %}active{% endif %}">
            <i class="fa-solid fa-code"></i> Workspace
        </a>
    </div>
    <div class="nav-right">
        <button id="theme-toggle" class="btn-theme-toggle" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
        <span class="nav-user">
            <i class="fa-solid fa-user-circle"></i> {{ request.user.username }}
        </span>
        <a href="{% url 'accounts:logout' %}" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>
{% endif %}

<main class="main-content">
    {% if messages %}
        <div class="messages-container">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                    <span class="alert-close" onclick="this.parentElement.remove()">×</span>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}
    {% endblock %}
</main>

{% block extra_js %}
{% endblock %}

<script>
function applyTheme(theme) {
    if (theme === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('theme-icon').className = 'fa-solid fa-sun';
    } else {
        document.body.classList.remove('light-theme');
        document.getElementById('theme-icon').className = 'fa-solid fa-moon';
    }
}

function toggleTheme() {
    const isLight = document.body.classList.contains('light-theme');
    const newTheme = isLight ? 'dark' : 'light';
    localStorage.setItem('codemedic-theme', newTheme);
    applyTheme(newTheme);
}

// Apply saved theme on every page load
const savedTheme = localStorage.getItem('codemedic-theme') || 'dark';
applyTheme(savedTheme);
</script>

</body>
</html>
